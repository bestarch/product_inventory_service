apiVersion: apps/v1
kind: Deployment
metadata:
  name: product-inventory-service-deployment
  namespace: app-poc
  labels:
    app: product-inventory-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: product-inventory-service
  template:
    metadata:
      labels:
        app: product-inventory-service
    spec:
      containers:
        - name: product-inventory-service
          image: abhishekcoder/product-inventory-service:latest
          ports:
          - name: http
            containerPort: 8080
          imagePullPolicy: IfNotPresent
          env:
            - name: MONGO_HOST
              valueFrom:
                configMapKeyRef:
                  name: my-config
                  key: MONGO_HOST
            - name: MONGO_USER
              valueFrom:
                configMapKeyRef:
                  name: my-config
                  key: MONGO_USER
            - name: MONGO_PASSWORD
              valueFrom:
                configMapKeyRef:
                  name: my-config
                  key: MONGO_PASSWORD
        
          volumeMounts:
            - name: my-volume
              mountPath: /app/myuser.txt
              subPath: myuser.txt
              readOnly: true  
            

      volumes:
        - name: my-volume
          configMap:
            name: app-file-config
