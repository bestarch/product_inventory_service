<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title th:text="${mode == 'edit'} ? 'Edit Product' : 'New Product'">Product</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}"/>
</head>
<body>
<div class="user-bar">
    Hi <strong th:text="${currentUser}">User</strong>!!!
</div>
<div class="container">
    <header>
        <h1 th:text="${mode == 'edit'} ? 'Edit Product' : 'New Product'">Product</h1>
        <a class="btn" th:href="@{/products}">Back to list</a>
    </header>

    <form th:action="${mode == 'edit'} ? @{'/products/' + ${product.id}} : @{/products}"
          th:object="${product}" method="post" class="product-form">

        <div class="field">
            <label for="name">Name</label>
            <input type="text" id="name" th:field="*{name}"/>
            <p class="error" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></p>
        </div>

        <div class="field">
            <label for="sku">SKU</label>
            <input type="text" id="sku" th:field="*{sku}"/>
            <p class="error" th:if="${#fields.hasErrors('sku')}" th:errors="*{sku}"></p>
        </div>

        <div class="field">
            <label for="category">Category</label>
            <input type="text" id="category" th:field="*{category}"/>
            <p class="error" th:if="${#fields.hasErrors('category')}" th:errors="*{category}"></p>
        </div>

        <div class="field">
            <label for="description">Description</label>
            <textarea id="description" rows="3" th:field="*{description}"></textarea>
        </div>

        <div class="field-row">
            <div class="field">
                <label for="price">Price</label>
                <input type="number" id="price" step="0.01" min="0" th:field="*{price}"/>
                <p class="error" th:if="${#fields.hasErrors('price')}" th:errors="*{price}"></p>
            </div>

            <div class="field">
                <label for="quantity">Quantity</label>
                <input type="number" id="quantity" min="0" th:field="*{quantity}"/>
                <p class="error" th:if="${#fields.hasErrors('quantity')}" th:errors="*{quantity}"></p>
            </div>
        </div>

        <div class="form-actions">
            <button type="submit" class="btn btn-primary"
                    th:text="${mode == 'edit'} ? 'Save changes' : 'Create product'">Save</button>
            <a class="btn" th:href="@{/products}">Cancel</a>
        </div>
    </form>
</div>
</body>
</html>
